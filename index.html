<title>Pixel · 作品集</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f1117;--surface:#1a1d27;--text:#e2e4e9;--text-muted:#7b8090;--text-dim:#4b5060;--accent:#d49b3e;--accent-dim:#8b6018;--line:#2a2e3a}
body{font-family:"PingFang SC","Noto Sans SC","Hiragino Sans GB","Microsoft YaHei",system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.hero{text-align:center;padding:100px 24px 40px;max-width:640px;margin:0 auto}
.hero h1{font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;letter-spacing:.06em}
.hero p{color:var(--text-muted);font-size:.9rem;margin-top:12px}
.nav{max-width:800px;margin:0 auto;padding:0 24px 80px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:24px;text-decoration:none;transition:border-color .25s,background .25s;display:flex;flex-direction:column;gap:8px}
.card:hover{border-color:var(--accent-dim);background:#222636}
.card .title{font-size:1.1rem;font-weight:600;color:var(--accent)}
.card .desc{font-size:.8rem;color:var(--text-dim);line-height:1.6}
.footer{text-align:center;padding:60px 24px;font-size:.75rem;color:var(--text-dim)}
@media(max-width:600px){.hero{padding:60px 16px 30px}.nav{grid-template-columns:1fr;padding:0 16px 60px}}
</style>
</head>
