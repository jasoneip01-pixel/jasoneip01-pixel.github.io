<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#14141f"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.8" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="rgba(167,139,250,0.08)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.2" cy="0.8" r="0.4">
      <stop offset="0%" stop-color="rgba(244,63,94,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  
  <!-- Logo/title -->
  <text x="600" y="260" text-anchor="middle" font-family="Georgia, 'Noto Serif SC', serif" font-size="72" font-weight="bold" fill="url(#title)">灵魂快照</text>
  <text x="600" y="310" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="28" fill="#9898b0">Soul Snapshot — AI-Native Personality Test</text>
  
  <!-- Decorative line -->
  <line x1="460" y1="350" x2="740" y2="350" stroke="url(#title)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Description -->
  <text x="600" y="420" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#e4e4ec">15 道题，50 个灵魂种子</text>
  <text x="600" y="465" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" fill="#e4e4ec">不是 27 选 1 的统计标签，是 AI 为你生成的那一个</text>
  
  <!-- Footer -->
  <text x="600" y="560" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#6b6b80">jasoneip01-pixel.github.io</text>
</svg>
