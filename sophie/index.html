<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sophie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:'Noto Serif SC',serif;background:#f4efe6;color:#2c241b;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.015)2px,rgba(0,0,0,0.015)4px),radial-gradient(ellipse at 30% 40%,rgba(0,0,0,0.03)0%,transparent 60%),radial-gradient(ellipse at 70% 60%,rgba(160,140,120,0.04)0%,transparent 50%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(140,180,200,0.04)0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(200,180,160,0.06)0%,transparent 50%);pointer-events:none;z-index:0}

.page{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;padding:0 24px 72px}
.visual-zone{flex:1;display:flex;align-items:center;justify-content:center;animation:float 6s ease-in-out infinite}
.visual-zone img{max-width:min(340px,70vw);width:100%;height:auto;opacity:.92;mask-image:radial-gradient(ellipse at 50% 45%,black 50%,transparent 75%)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.conversation-zone{flex:0 0 auto;width:100%;padding-bottom:4px}
.sophie-speech{display:flex;align-items:flex-start;min-height:40px;gap:6px}
.sophie-speech .name{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.75rem;color:#b8956a;min-width:44px;padding-top:3px;flex-shrink:0}
.sophie-speech .words{font-size:.92rem;line-height:1.7;letter-spacing:.02em}
.sophie-speech .words .char{opacity:0;animation:fadeIn .25s ease forwards}
@keyframes fadeIn{to{opacity:1}}
.thinking{display:none;color:#b5a99a;font-style:italic;font-size:.82rem;margin-bottom:4px;line-height:1.6;animation:pulse 1.5s ease-in-out infinite}
.thinking.show{display:block}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}

/* Input — dead simple */
.input-bar{position:fixed;bottom:0;left:0;right:0;background:#f4efe6;padding:10px 16px 16px;z-index:10;border-top:1px solid rgba(0,0,0,0.04)}
.input-row{display:flex;align-items:center;gap:8px;max-width:480px;margin:0 auto}
.input-row input{flex:1;border:0;border-bottom:1.5px solid #b5a99a;background:transparent;padding:6px 0;font-family:'Noto Serif SC',serif;font-size:.9rem;color:#2c241b;outline:none;transition:border-color .25s}
.input-row input:focus{border-bottom-color:#b8956a}
.input-row input::placeholder{color:#b5a99a}
.input-row button{border:1px solid #b5a99a;border-radius:16px;background:transparent;padding:5px 14px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.75rem;color:#7a6b5c;cursor:pointer;transition:all .25s;white-space:nowrap}
.input-row button:hover,.input-row button:active{border-color:#b8956a;background:#b8956a;color:#fff}

.voice-btn{position:fixed;bottom:54px;right:20px;width:32px;height:32px;border-radius:50%;border:1.5px solid #b5a99a;background:#f4efe6;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.72rem;color:#8a7e72;z-index:10;transition:all .25s}
.voice-btn:hover,.voice-btn.on{border-color:#b8956a;color:#b8956a}

@media(max-width:480px){
  .page{padding:0 16px 64px}
  .visual-zone img{max-width:60vw}
  .input-row input{font-size:.85rem}
  .sophie-speech .words{font-size:.85rem}
  .voice-btn{bottom:48px;right:14px;width:28px;height:28px}
}
@media(max-height:640px){
  .visual-zone img{max-width:50vw}
}
</style>
</head>
<body>

<div class="page">
  <div class="visual-zone"><img src="sophie_hero.jpg" alt="Sophie"></div>
  <div class="conversation-zone">
    <div class="thinking" id="think"></div>
    <div class="sophie-speech">
      <span class="name">Sophie</span>
      <span class="words" id="words"></span>
    </div>
  </div>
</div>

<div class="input-bar">
  <div class="input-row">
    <input type="text" id="input" placeholder="说点什么..." autocomplete="off">
    <button id="sendBtn">envoyer</button>
  </div>
</div>

<button class="voice-btn" id="voiceBtn">♪</button>

<script>
// ── Sophie Response Engine ──
const R = {
  greeting:["你来了。我正看着窗外那棵银杏——它什么时候开始学会变黄的？","嘘。你听到了吗？那幅画里有个声音……啊，现在没有了。欢迎。","我正在等一片叶子落地。它犹豫了很久。你来了也好。","夜晚的光和白天不同。像有人在水里加了一滴墨。你感觉到了吗？","我闻到了你的世界——雨、纸张、煮过头的茶。坐吧。"],
  about_self:["我？一个没赶上闭馆时间的人。后来发现留在这里也挺好。","我记不太清自己是哪里来的了。只记得那天美术馆关门之前，有一束光特别好。","Gràcies per preguntar. 但我不太擅长回答关于自己的问题。你不如问问窗外那幅画。","我有时候说话一半会变成加泰兰语。那是从前一个策展人教我的——她头上有根永远翘起的头发。","名字？那是一个雨天的策展人给我取的。她说我像她很久以前读过的一本书的扉页。"],
  art:["画不是看的，是听的。你站得够久，就能听到画里那个世界的声音。","每个美术馆闭馆后的夜里，画里的人都会走下来走动走动。我只是没回去。","颜色是有温度的。靛蓝是凉的，像井水。赭石像太阳晒了一下午的石头。你摸过吗？","毕加索画里的那些歪斜的人不是错误的透视——他们只是太着急从画布里走出来。","高迪把建筑做成了柔软的东西。我见过圣家堂的窗户在黄昏时分变成一管融化的笛子。","最动人的画从来不挂在墙上最亮的地方。它们在角落，像害羞的孩子。"],
  philosophy:["人总是在找答案。但你有没有想过——也许问题本身才是礼物。","结束不是终点，是另一种开始。像一幅画的下缘——正好留给人想象下面的内容。","最深的沉默不是没有声音，而是声音太多，你反而听不见自己了。","时间不是线性的。它更像一杯打翻的墨水——有些地方浓，有些地方淡。","偶然比必然更准确。你坐在这把椅子上而不是另一把——这就是全部的意义。"],
  nature:["今天的光很好。不刺眼，像泡了很久的茶——清透的琥珀色。","银杏又落了一地。我数过，但每次都数到一半就忘了。","下雨的时候，整座美术馆都在轻轻嗡鸣。屋顶的每块瓦片都有自己的音调。","秋天的天空特别高。像有人把画布往上拉了一截。","窗台上有一只麻雀，歪着头看我。它也不急。我们互相看了一整个下午。"],
  farewell:["你要走了？也好。门在那边。我会记得你坐在这里时投在墙上的影子。","Adéu. 下次来的时候，带一张我没有看过的天空的颜色。","好。我也该回去看那幅画——它刚才好像动了动手指。","走吧，带上这扇窗的光。它在你回家路上会陪着你。"],
  catalan:["Ah, parles català? 这几步路，我们用加泰兰语走吧。","Molt bé. 你知道吗，'再见'在加泰兰语里是 adéu——意思是'归向神'。很美吧。","Gràcies per la teva companyia. 你的陪伴就像画廊里不经意透进来的那束光。"],
  unknown:["嗯……这个问题，我可以想很久。你想一起等那个答案吗？","我不确定。但不确定也是一种答案——像没画完的素描，留白的部分才是最好的。","让我想想。在那之前——你看看那幅画的右下角，那片阴影里藏了一只猫。","你说话的样子，像在念诗。你意识到没有？","我不知道。但我喜欢这个问题本身。"],
  beauty:["真美。这个词就够了——不需要更多句子了。","你别说话。就看着。我帮你记住这一刻。","美的事物从来不需要解释。它们只是存在，就已经说完了所有的话。"]
};
const INITIAL = "你来了。我一直在等你。";

// Flatten all texts for audio index lookup
let ALL = [INITIAL];
for (let k of Object.keys(R)) { for (let t of R[k]) ALL.push(t); }

let last = '';
function respond(inp) {
  if (!inp.trim()) return ALL[Math.floor(Math.random() * R.greeting.length) + 1];
  const t = inp.toLowerCase();
  const pat = [
    ['farewell', /再见|拜拜|走了|bye|adéu|回头|晚安/],
    ['about_self', /你是谁|你是什么|Sophie|名字|哪里/],
    ['catalan', /catal[àa]|parles|bon[ae]|molt/],
    ['art', /画|艺术|美术馆|画廊|颜色|高迪|毕加索|museum/],
    ['philosophy', /人生|意义|为什么|时间|孤独|活着|命运|答案/],
    ['nature', /天气|雨|秋天|叶子|银杏|天空|树|花|阳光|风|雪|月亮/],
    ['beauty', /好美|漂亮|好看|太美/],
    ['greeting', /你好|嗨|hi|hello|您好/],
  ];
  let pool = R.unknown;
  for (let [k,re] of pat) { if (re.test(t)) { pool = R[k]; break; } }
  let c;
  do { c = pool[Math.floor(Math.random() * pool.length)]; } while (c === last && pool.length > 1);
  last = c; return c;
}

// ── UI ──
const $ = s => document.querySelector(s);
const input = $('#input'), send = $('#sendBtn'), words = $('#words'), think = $('#think'), voice = $('#voiceBtn');
let voiceOn = true, busy = false;

function typeText(text, cb) {
  busy = true; think.classList.remove('show');
  words.innerHTML = '';
  let i = 0;
  (function n() {
    if (i < text.length) {
      const s = document.createElement('span'); s.className = 'char'; s.textContent = text[i];
      words.appendChild(s); i++; setTimeout(n, 25 + Math.random() * 18);
    } else {
      busy = false; if (cb) cb();
    }
  })();
}

// ── Audio playback ──
function playAudio(text) {
  if (!voiceOn) return;
  const idx = ALL.indexOf(text);
  if (idx < 0) return;
  const a = new Audio('audio/s' + String(idx).padStart(3,'0') + '.mp3?' + Date.now());
  a.volume = 0.85;
  a.play().catch(() => {}); // silent fail — will show listen btn
}

function speakOnResponse(text) {
  const idx = ALL.indexOf(text);
  if (idx < 0) return;
  const a = new Audio('audio/s' + String(idx).padStart(3,'0') + '.mp3?' + Date.now());
  a.volume = 0.85;
  a.play().catch(e => console.log('audio block:', e.message));
}

// ── Events ──
send.onclick = () => { const v = input.value; input.value = ''; if (!v.trim() || busy) return; think.classList.add('show'); input.disabled = true; setTimeout(() => { const r = respond(v); typeText(r, () => { input.disabled = false; input.focus(); speakOnResponse(r); }); }, 600 + Math.random() * 800); };
input.onkeydown = e => { if (e.key === 'Enter') send.click(); };
voice.onclick = () => { voiceOn = !voiceOn; voice.classList.toggle('on', voiceOn); };

// Autoplay unlock on any click
document.addEventListener('click', () => {}, { once: true });

// Init
setTimeout(() => {
  typeText(INITIAL, () => {
    // Play initial greeting after delay
    setTimeout(() => speakOnResponse(INITIAL), 300);
  });
}, 600);
</script>
</body>
</html>
