name: News Relay — Western financial/tech sources

on:
  schedule:
    # Twice daily: 06:00 UTC (14:00 BJT) and 18:00 UTC (02:00 BJT)
    - cron: '0 6,18 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/news_relay.py'
      - 'data/news/TRIGGER'
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests lxml

      - name: Run collector
        run: python3 .github/workflows/news_relay.py

      - name: Commit & push
        run: |
          git config user.name "news-relay-bot"
          git config user.email "bot@local"
          git add data/news/
          git diff --staged --quiet || (git commit -m "news-relay: $(date -u +%Y-%m-%dT%H:%M)"; git push)
