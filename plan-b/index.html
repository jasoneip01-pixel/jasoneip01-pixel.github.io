  {"id":32,"category":"重力中心","name":"重力中心·不说话但所有人围着你转型","tagline":"房间里有你，就有了秩序","description":"你不是话最多的那个人——但你是所有人下意识看向的那个人。你的气场不是靠音量建立的，是靠”存在感”。一个房间里只要有一个你，不管多混乱，都不会散。你不是领导——你是引力。你不会做选择时东张西望，因为选择本身就是你的第二本能。","signature":"我不用说话，因为我在就够了。","vector":[0.1,0.4,0.2,0.7],"celebrities":"《教父》的安静气场 × 交响乐指挥家的背影 × 一群人中第一个起身的人","vibe":"gravity-well"},

  {"id":35,"category":"冰面破局者","name":"冰面破局者·沉默但从不沉默·克制是最高较量型","tagline":"我不说话的时候，才是我在说话","description":"你不是不说话——你是在等所有人说完。然后你用一句话总结，让整个房间安静。你的克制不是因为无话可说，是因为你计算过了——你的每一个字都值钱，你不能乱花。别人用音量打牌，你用沉默。每次你开口，冰面裂开一条缝，下面是一个更深的世界。","signature":"说话之前，我已经说了很多。","vector":[0.0,0.55,0.0,0.85],"celebrities":"黑泽明的静态画面 × 贝克特的等待戈多 × 冬天湖面上的脚步声","vibe":"ice-crack"},

  {"id":37,"category":"高空绳索者","name":"高空绳索者·没有安全网·但走了十年没掉过一次型","tagline":"恐惧是我的老朋友，不是我的老板","description":"你做的事在别人看来是玩命。但你心里有数——你的高风险决策背后是海量的无声准备。别人看到你走高空绳索，没看到你练了三千次。你的自信不是莽撞，是被恐惧验证过一万次之后的从容。你知道最坏的结果是什么，而且你发现——最坏的结果也没那么坏。","signature":"说“我怕”和“我去”之间，只隔了一秒。","vector":[0.1,0.95,0.3,0.1],"celebrities":"亚历克斯·霍诺德的徒手攀岩 × 所有辞职追梦的人 × 走钢丝的菲利普·珀蒂","vibe":"tightrope"},

// Particle System
// ═══════════════════════════════════════════════
const particleCanvas = document.getElementById('particleCanvas');
const pctx = particleCanvas.getContext('2d');
let particles = [];

function resizeCanvas() {

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function createParticle(x, y) {
  return {
    x: x ?? Math.random() * particleCanvas.width,
    y: y ?? Math.random() * particleCanvas.height,
    vx: (Math.random() - 0.5) * 0.4,
    vy: (Math.random() - 0.5) * 0.4,
    baseVx: 0, baseVy: 0,
    size: 1.2 + Math.random() * 2.0,
    opacity: 0.15 + Math.random() * 0.35,
    color: particleColors[Math.floor(Math.random() * particleColors.length)],
    pulsePhase: Math.random() * Math.PI * 2
  };
}

function initParticles(count) {
  particles = [];
  for (let i = 0; i < count; i++) {
    particles.push(createParticle());
  }
}

function setParticleTarget(n) {
  particleTargetCount = Math.max(20, Math.min(80, n));
}

function burstParticles() {
  const cx = particleCanvas.width / 2;
  const cy = particleCanvas.height / 2;
  particleMode = 'burst';
  burstTimer = 60;
  // Create burst particles
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 4 + Math.random() * 8;
    const p = createParticle(cx, cy);
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.opacity = 0.6 + Math.random() * 0.4;
    p.size = 1.8 + Math.random() * 2.5;
    particles.push(p);
  }
  particleTargetCount = 60;
}

function settleConstellation(vector) {
  const cx = particleCanvas.width / 2;
  const cy = particleCanvas.height / 2;
  const r = Math.min(cx, cy) * 0.5;
  particleMode = 'constellation';
  burstTimer = 0;
  // Move existing particles toward a loose constellation around the 4 score points
  const angles = [-Math.PI/2, 0, Math.PI/2, Math.PI]; // top, right, bottom, left
  const colors = ['#a78bfa','#f59e0b','#14b8a6','#f43f5e'];
  for (let i = 0; i < 4; i++) {
    const dist = Math.max(0.2, vector[i]) * r;
    const tx = cx + Math.cos(angles[i]) * dist;
    const ty = cy + Math.sin(angles[i]) * dist;
    // Create 4-5 particles near each point
    for (let j = 0; j < 5; j++) {
      const p = particles[i * 5 + j];
      if (p) {
        p.targetX = tx + (Math.random() - 0.5) * 40;
        p.targetY = ty + (Math.random() - 0.5) * 40;
        p.color = colors[i];
        p.opacity = 0.5 + Math.random() * 0.3;
        p.size = 1.5 + Math.random() * 2;
      } else {
        const np = createParticle(tx, ty);
        np.color = colors[i];
        np.opacity = 0.5;
        np.size = 2;
        np.targetX = tx + (Math.random() - 0.5) * 40;
        np.targetY = ty + (Math.random() - 0.5) * 40;
        particles.push(np);
      }
    }
  }
  // Add decorative background stars
  for (let i = 0; i < 10; i++) {
    const dp = createParticle(
      cx + (Math.random() - 0.5) * r * 1.8,
      cy + (Math.random() - 0.5) * r * 1.8

    dp.opacity = 0.1 + Math.random() * 0.2;
    dp.color = '#ffffff';
    particles.push(dp);
  }
  particleTargetCount = particles.length;
}

function animateParticles() {
  pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

  const dt = 1; // simplified
  const cx = particleCanvas.width / 2;
  const cy = particleCanvas.height / 2;

  // Adjust count
  while (particles.length < particleTargetCount) {
    particles.push(createParticle());
  }
  if (particles.length > particleTargetCount && particleMode !== 'constellation' && particleMode !== 'burst') {
    particles.splice(particles.length - 1, 1);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];

    if (particleMode === 'burst') {
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.opacity *= 0.985;
      p.x += p.vx;
      p.y += p.vy;
      if (p.opacity < 0.01) {
        particles.splice(i, 1);
        continue;
      }
    } else if (particleMode === 'constellation' && p.targetX !== undefined) {
      // Smoothly move toward target
      p.x += (p.targetX - p.x) * 0.03;
      p.y += (p.targetY - p.y) * 0.03;
      p.vx = (p.targetX - p.x) * 0.01 + (Math.random() - 0.5) * 0.1;
      p.vy = (p.targetY - p.y) * 0.01 + (Math.random() - 0.5) * 0.1;
    } else {
      // Normal ambient drift
      // Gentle mouse attraction
      const dx = mouseX - p.x;
      const dy = mouseY - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 250 && dist > 0) {
        const force = 0.008;
        p.vx += (dx / dist) * force;
        p.vy += (dy / dist) * force;
      }
      // Damping
      p.vx *= 0.999;
      p.vy *= 0.999;
      // Brownian
      p.vx += (Math.random() - 0.5) * 0.05;
      p.vy += (Math.random() - 0.5) * 0.05;
      // Speed clamp
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > 0.7) { p.vx *= 0.7 / speed; p.vy *= 0.7 / speed; }
      p.x += p.vx;
      p.y += p.vy;
    }

    // Wrap around
    if (p.x < -20) p.x = particleCanvas.width + 20;
    if (p.x > particleCanvas.width + 20) p.x = -20;
    if (p.y < -20) p.y = particleCanvas.height + 20;
    if (p.y > particleCanvas.height + 20) p.y = -20;

    // Pulse
    const pulse = 1 + Math.sin(Date.now() * 0.002 + p.pulsePhase) * 0.3;
    const alpha = p.opacity * (particleMode === 'constellation' ? (0.7 + Math.sin(Date.now() * 0.003 + i) * 0.3) : 1);

    // Draw
    pctx.beginPath();
    pctx.arc(p.x, p.y, p.size * pulse, 0, Math.PI * 2);
    pctx.fillStyle = p.color;
    pctx.globalAlpha = Math.max(0.02, alpha);
    pctx.fill();

    // Subtle glow for larger particles
    if (p.size > 1.8) {
      pctx.beginPath();
      pctx.arc(p.x, p.y, p.size * pulse * 2.5, 0, Math.PI * 2);
      pctx.fillStyle = p.color;
      pctx.globalAlpha = Math.max(0.01, alpha * 0.2);
      pctx.fill();

  }
  pctx.globalAlpha = 1;

  if (particleMode === 'burst') {
    burstTimer--;
    if (burstTimer <= 0) {
      particleMode = 'ambient';
    }
  }

  pAnimId = requestAnimationFrame(animateParticles);

function renderConstellation(vector, canvasEl) {

  // Grid rings (subtle)
  for (let i = 1; i <= 3; i++) {
    const rr = r * i / 3;
    ctx.beginPath();
    ctx.arc(cx, cy, rr, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(42,42,58,0.4)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Axis lines
  const axes = [
    { angle: -Math.PI / 2 }, // top - thinking
    { angle: 0 },             // right - drive
    { angle: Math.PI / 2 },   // bottom - connection
    { angle: Math.PI }        // left - rhythm
  ];
  axes.forEach(a => {
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a.angle) * r, cy + Math.sin(a.angle) * r);
    ctx.strokeStyle = 'rgba(42,42,58,0.5)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  });

  // Constellation points
  const pointColors = ['#a78bfa', '#f59e0b', '#14b8a6', '#f43f5e'];
  const points = axes.map((a, i) => ({
    x: cx + Math.cos(a.angle) * Math.max(0.15, vector[i]) * r,
    y: cy + Math.sin(a.angle) * Math.max(0.15, vector[i]) * r,
    color: pointColors[i],
    score: vector[i]
  }));

  // Connecting lines
  for (let i = 0; i < points.length; i++) {
    const j = (i + 1) % points.length;
    ctx.beginPath();
    ctx.moveTo(points[i].x, points[i].y);
    ctx.lineTo(points[j].x, points[j].y);
    const grad = ctx.createLinearGradient(points[i].x, points[i].y, points[j].x, points[j].y);
    grad.addColorStop(0, points[i].color);
    grad.addColorStop(1, points[j].color);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.2;
    ctx.globalAlpha = 0.7;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Cross lines (for extra constellation feel)
  ctx.beginPath();
  ctx.moveTo(points[0].x, points[0].y);
  ctx.lineTo(points[2].x, points[2].y);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(points[1].x, points[1].y);
  ctx.lineTo(points[3].x, points[3].y);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // Glowing star points
  points.forEach((p, i) => {
    // Outer glow
    const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 14);
    glow.addColorStop(0, p.color);
    glow.addColorStop(0.4, p.color + '88');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(p.x, p.y, 14, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // Inner star
    const star = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 4);
    star.addColorStop(0, '#ffffff');
    star.addColorStop(0.3, p.color);
    star.addColorStop(1, p.color + '00');
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
    ctx.fillStyle = star;
    ctx.fill();
  });

  // Labels
  const labels = ['直觉⟷分析', '恐惧⟷欲望', '独立⟷依附', '冲刺⟷巡航'];
  axes.forEach((a, i) => {
    const lx = cx + Math.cos(a.angle) * (r + 24);
    const ly = cy + Math.sin(a.angle) * (r + 24);
    ctx.fillStyle = '#9898b0';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[i], lx, ly);
  });

  return canvasEl;
}

function renderQuiz() {
  const q = questions.questions[state.currentQ];
  const total = questions.questions.length;

  const isBonus = q.facet === 'bonus';

  applyTheme(q.facet);

  const segmentPositions = [20, 40, 60, 80];

function selectAnswer(idx) {
  const q = questions.questions[state.currentQ];
  const weights = q.options[idx].weights;

  // Accumulate scores
  for (let i = 0; i < weights.length; i++) {
    state.scores[i] += weights[i];
  }
  state.answers.push(idx);

  if (state.currentQ < questions.questions.length - 1) {
    // Highlight clicked option + disable interactions during transition
    const opts = document.querySelectorAll('.option');
    if (opts[idx]) opts[idx].classList.add('selected');
    opts.forEach(o => o.style.pointerEvents = 'none');
    // Zoom-blur transition
    const card = document.querySelector('.card');
    if (card) {
      card.classList.add('exiting');
      setTimeout(() => {
        state.currentQ++;
        render();
        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 320);
    } else {
      state.currentQ++;
      render();
    }
  } else {
    // Transition to results with burst
    setParticleTarget(baseParticleCount + 30);
    burstParticles();
    setTimeout(() => {
      calculateResults();
    }, 600);
  }
}

// ═══════════════════════════════════════════════
// Scoring Engine (IDENTICAL to original)
// ═══════════════════════════════════════════════
function calculateResults() {
  const numQuestions = questions.questions.length;
  const dims = state.scores.map(s => Math.min(1, Math.max(0, s / numQuestions)));

  const thinking = dims[1];
  const drive = dims[3];
  const connection = dims[5];
  const rhythm = dims[7];
  const userVector = [thinking, drive, connection, rhythm];

  const scored = personalities.map(p => {
    const pv = p.vector;
    const dist = Math.sqrt(
      Math.pow(userVector[0] - pv[0], 2) +
      Math.pow(userVector[1] - pv[1], 2) +
      Math.pow(userVector[2] - pv[2], 2) +
      Math.pow(userVector[3] - pv[3], 2)
    );
    return { ...p, distance: dist };
  });

  scored.sort((a, b) => a.distance - b.distance);
  const topCandidates = scored.slice(0, 3);
  const selected = topCandidates[Math.floor(Math.random() * Math.min(3, topCandidates.length))];

  state.result = {
    personality: selected,
    vector: userVector,
    bonusScore: dims[8],
    alternatives: scored.slice(1, 4).map(p => p)
  };

  // Trigger constellation particle mode
  settleConstellation(userVector);

  state.screen = 'results';
  render();
  window.scrollTo(0, 0);
}

// Constellation Chart (renders into canvas)
// ═══════════════════════════════════════════════
function renderConstellationChart(vector) {
  const container = document.createElement('div');
  container.className = 'constellation-wrap';
  const canvas = document.createElement('canvas');
  canvas.className = 'constellation-canvas';
  container.appendChild(canvas);

  // Defer render to next frame so canvas is in DOM
  requestAnimationFrame(() => {
    renderConstellation(vector, canvas);
    // Animate pulse
    let phase = 0;
    function pulse() {
      phase += 0.02;
      renderConstellation(vector, canvas);
      if (state.screen === 'results') {
        requestAnimationFrame(() => setTimeout(pulse, 2000));
      }
    }
    setTimeout(pulse, 2000);
  });

  return container;
}

        <div style="font-size:14px;font-weight:700;background:linear-gradient(135deg,#a78bfa,#f43f5e,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px">随手拆了下自己，原来我是那个隐藏</div>
        <div style="font-size:9px;color:#6b6b80">jasoneip01-pixel.github.io/plan-b</div>
        <div style="position:absolute;bottom:10px;right:10px;display:flex;align-items:center;gap:4px;opacity:0.8">
          <div style="font-size:7px;color:#6b6b80;text-align:right;line-height:1.3">扫码<br>测测</div>
          <div id="shareQrWrap" style="width:56px;height:56px;border-radius:4px;background:#fff;display:flex;align-items:center;justify-content:center"></div>
        </div>
      </div>
    `;
    c.innerHTML = '';
    c.appendChild(card);

    // Load QR code then render
    const qrImg = new Image();
    qrImg.crossOrigin = 'anonymous';
    qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=56x56&margin=2&data=' + encodeURIComponent('https://jasoneip01-pixel.github.io/plan-b');
    qrImg.onload = function() {
      const wrap = document.getElementById('shareQrWrap');
      if (wrap) { wrap.innerHTML = ''; wrap.appendChild(qrImg); qrImg.style.cssText = 'width:56px;height:56px'; }
      renderCard();
    };
    qrImg.onerror = function() { renderCard(); };
    // Timeout fallback: render after 3s even if QR doesn't load
    setTimeout(function() { if (!window._shareImgData) renderCard(); }, 3000);
    function renderCard() {
      const scale = Math.min(window.devicePixelRatio || 2, 3);
      html2canvas(card, { scale: scale, backgroundColor: null, useCORS: true, logging: false, allowTaint: true }).then(function(canvas) {
      window._shareCanvas = canvas;
      window._shareImgData = canvas.toDataURL('image/png');
      
      content.innerHTML = '<div class="share-img-wrap">' +
        '<img src="' + window._shareImgData + '" alt="随手拆了下自己，原来我是那个隐藏 · ' + p.name + '">' +
        '<div class="share-save-guide">' +
          (_isWechat
            ? '<div class="primary-hint">👆 长按上方图片 → 保存到相册</div><div class="secondary-hint">或点击下方「复制文案」分享</div>'
            : _isIOS && _canShare
              ? '<div class="primary-hint">👆 长按图片保存 · 或点击下方分享</div><div class="secondary-hint">支持 AirDrop / 微信 / 相册</div>'
              : _isMobile
                ? '<div class="primary-hint">👆 长按图片保存到相册</div><div class="secondary-hint">或点击下方按钮分享</div>'
                : '<div class="primary-hint">右键图片保存 · 或点击下载</div><div class="secondary-hint">扫码或截图发给朋友</div>') +
          '<div class="platform-actions">' +
            (_canShare && !_isWechat
              ? '<button class="btn btn-primary" onclick="systemShare()">📤 分享给朋友</button>'
              : '') +
            (!_isWechat && !_isIOS
              ? '<button class="btn btn-secondary" onclick="downloadImage()">💾 下载图片</button>'
              : '') +
          '</div>' +
        '</div>' +
      '</div>';
      overlay.classList.add('has-image');
      overlay.querySelector('.share-actions').innerHTML =
        '<button class="btn btn-secondary" onclick="closeShare()">关闭</button>' +
        '<button class="btn btn-primary" onclick="copyShareCard()">📋 复制文案</button>' +
        '<button class="btn btn-primary" onclick="saveShareImage()">🔄 重新生成</button>' +
        '<button class="btn btn-primary" onclick="shareLink()" style="background:linear-gradient(135deg,var(--accent2),var(--gold))">🔗 分享链接</button>';
    }).catch(function() {
      content.innerHTML = '<div style="text-align:center;padding:16px;color:#9898b0">' +
        '<div style="font-size:1.2rem;margin-bottom:8px">📸</div><div>图片生成失败</div>' +
        '<div style="font-size:0.8rem;margin:8px 0 12px">请截屏保存，或使用「复制文案」分享</div></div>';
      overlay.classList.add('has-image');
      overlay.querySelector('.share-actions').innerHTML =
        '<button class="btn btn-secondary" onclick="closeShare()">关闭</button>' +
        '<button class="btn btn-primary" onclick="showShare()">返回卡片</button>';
    });
  }

  if (window.html2canvas) { doRender(); }
  else {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    script.onload = doRender;
    script.onerror = function() {
      content.innerHTML = '<div style="text-align:center;padding:24px;color:#f59e0b">⚠️ 图片引擎加载失败<br><small style="color:#9898b0">请截屏保存，或用「复制文案」分享</small></div>';
    };
    document.head.appendChild(script);
  }
}

function systemShare() {
  if (!window._shareCanvas || !navigator.share) return;
  const p = state.result.personality;
  const url = window.location.href.split('?')[0] +
    '?n=' + encodeURIComponent(p.name) +
    '&s=' + encodeURIComponent(p.signature || '') +
    '&t=' + encodeURIComponent(p.tagline || '');
  const text = '我拆出了一个隐藏款——【' + p.name + '】！' +
    (p.signature ? p.signature + '…' : '') +
    '你也拆开自己看看👉 ' + url;
  window._shareCanvas.toBlob(function(blob) {
    const file = new File([blob], p.name + '.png', { type: 'image/png' });
    navigator.share({ title: '我的 AI 人格：' + p.name, text: text, files: [file] }).catch(function() {});
  }, 'image/png');
}

function downloadImage() {
  if (!window._shareImgData) return;
  const a = document.createElement('a');
  a.href = window._shareImgData;
  a.download = (state.result.personality.name || 'hidden-figure') + '.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function shareLink() {
  const p = state.result.personality;
  const url = window.location.href.split('?')[0] +
    '?n=' + encodeURIComponent(p.name) +
    '&s=' + encodeURIComponent(p.signature || '') +
    '&t=' + encodeURIComponent(p.tagline || '') +
    '&v=' + encodeURIComponent(p.vibe || '');
  const text = '我拆出了一个隐藏款——【' + p.name + '】！' +
    (p.signature ? p.signature + '…' : '') +
    '你也拆开自己看看👉 ' + url;
  if (navigator.share) {
    navigator.share({ title: '随手拆了下自己，原来我是那个隐藏', text: text, url: url }).catch(function() {});
  } else {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(function() {
        alert('✅ 链接已复制！去微信发送给朋友吧～');
      });
    } else {
      prompt('复制这个链接发给朋友：', url);
    }
  }
}

// Landing page for shared link recipients
function renderShareLanding() {
  const p = state.result.personality;
  app.innerHTML = `
    <div class="header" style="padding:40px 0 20px">
      <div class="logo" style="font-size:clamp(0.9rem,3vw,1.3rem);line-height:1.5;opacity:0.7">你的朋友拆出了一个隐藏款…</div>
    </div>
    <div class="card entering" style="text-align:center;padding:36px 24px">
      <div style="font-size:3rem;margin-bottom:8px">🎁</div>
      <div style="display:inline-block;padding:3px 12px;border-radius:20px;font-size:10px;text-transform:uppercase;letter-spacing:0.15em;background:rgba(167,139,250,0.12);color:#a78bfa;border:1px solid rgba(167,139,250,0.2);margin-bottom:12px">${p.vibe || 'custom'}</div>
      <div style="font-family:Georgia,'Noto Serif SC',serif;font-size:clamp(1.4rem,5vw,2rem);font-weight:700;background:linear-gradient(135deg,#a78bfa,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px">${p.name}</div>
      <div style="font-size:0.9rem;color:#9898b0;font-style:italic;margin-bottom:10px">"${p.tagline || ''}"</div>
      <div style="font-family:Georgia,serif;font-size:1rem;color:#a78bfa;margin:8px 0;font-style:italic">${p.signature || ''}</div>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="font-size:0.85rem;color:var(--text2);margin-bottom:16px">你也想拆开自己？<br>看看AI说你是什么隐藏款</div>
        <button class="btn btn-primary" onclick="window.location.search='';render()" style="width:100%;padding:14px;font-size:1rem;border-radius:24px">⚡ 拆一个我的隐藏款</button>
      </div>
    </div>
    <div style="text-align:center;padding:16px;color:var(--text2);font-size:0.7rem">随手拆了下自己，原来我是那个隐藏</div>
  `;
  baseParticleCount = 40;
  initParticles(40);
}

// ═══════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════
initParticles(baseParticleCount);
animateParticles();

// Query param landing: friend shared their personality
const _params = new URLSearchParams(window.location.search);
const _pn = _params.get('n');
if (_pn) {
  state.result = { personality: {
    name: decodeURIComponent(_pn),
    signature: decodeURIComponent(_params.get('s') || ''),
    tagline: decodeURIComponent(_params.get('t') || ''),
    vibe: decodeURIComponent(_params.get('v') || ''),
    description: '这位朋友刚刚拆开了自己的人格盲盒。'
  }};
  renderShareLanding();
} else {
  render();
}
</script>

</body>
</html>
